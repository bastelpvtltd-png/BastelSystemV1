<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASTEL PVT LTD | Secure Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body data-ip="{{ ip }}">

    <div id="ipBlocker" class="popup-overlay" style="display: none; background: #000; z-index: 9999;">
        <div class="popup-box" style="border-color: #ff4444;">
            <h2 style="color: #ff4444;">ACCESS RESTRICTED</h2>
            <p style="margin: 20px 0;">Your IP: <strong id="displayIP"></strong> is not authorized.</p>
            <p style="font-size: 12px; opacity: 0.6;">Contact Admin to white-list your device.</p>
        </div>
    </div>

    <div id="login-page">
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="https://assets.mixkit.co/videos/preview/mixkit-cargo-ship-in-the-middle-of-the-ocean-41006-large.mp4" type="video/mp4">
            </video>
        </div>
        <div class="login-wrapper">
            <div class="login-box">
                <h1 class="brand-name">BASTEL</h1>
                <p class="sub-brand">Pvt Ltd | Logistics</p>
                <div class="input-group"><input type="text" id="userField" placeholder="Username"></div>
                <div class="input-group"><input type="password" id="passField" placeholder="Password"></div>
                <div class="options">
                    <input type="checkbox" id="agree">
                    <label for="agree">I agree to secure access terms</label>
                </div>
                <button onclick="handleLogin()" class="login-btn">Secure Login</button>
                <p id="errorMsg" style="color: #ff4444; margin-top: 15px; font-weight: bold;"></p>
            </div>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="top-nav">
            <h2 style="color: #FF9900; letter-spacing: 3px;">BASTEL</h2>
            <div class="nav-tabs" id="dynamicTabs"></div>
            <button onclick="location.reload()" style="margin-left:auto; background:transparent; border:1px solid #ff4444; color:#ff4444; padding:7px 15px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>

        <div class="content-area">
            <div id="HOME" class="tab-content">
                <h1>WELCOME, <span id="userSpan"></span></h1>
                <p style="margin-top:20px; opacity:0.7;">Designation: <span id="roleSpan"></span></p>
            </div>

            <div id="OPEN_ACCOUNT" class="tab-content">
                <div class="vertical-container">
                    <div class="v-side-menu">
                        <div class="v-tab active" onclick="showSubTab('ip-verify')">IP VERIFY</div>
                        <div class="v-tab" onclick="showSubTab('new-user')">NEW USER</div>
                    </div>
                    <div class="v-content">
                        <div id="ip-verify" class="sub-tab-content active">
                            <h2>IP AUTHORIZATION</h2>
                            <p>Current User IP: <span id="currentIpSpan" style="color:#FF9900;"></span></p>
                            <button onclick="requestIPAccess()" class="login-btn" style="width:200px; margin-top:20px;">Approve This IP</button>
                        </div>
                        <div id="new-user" class="sub-tab-content">
                            <h2>REGISTER NEW USER</h2>
                            <div class="input-group" style="margin-top:20px;">
                                <input type="text" id="regUser" placeholder="Username" style="margin-bottom:10px;">
                                <input type="password" id="regPass" placeholder="Password" style="margin-bottom:10px;">
                                <input type="text" id="regName" placeholder="Full Name" style="margin-bottom:10px;">
                                <button onclick="createNewAccount()" class="login-btn">Create Account</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="ACCESS" class="tab-content"><h1>Access Control</h1></div>
            <div id="CONTACT" class="tab-content"><h1>Contact Support</h1></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
