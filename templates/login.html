<div id="login-page">
    <div class="video-container">
        <video autoplay muted loop playsinline><source src="https://assets.mixkit.co/videos/preview/mixkit-cargo-ship-in-the-middle-of-the-ocean-41006-large.mp4" type="video/mp4"></video>
    </div>
    <div class="login-wrapper">
        <div class="login-box">
            <h1 class="brand-name">BASTEL</h1>
            <p class="sub-brand">Pvt Ltd | Logistics</p>
            <div class="input-group"><input type="text" id="userField" placeholder="Username" required></div>
            <div class="input-group"><input type="password" id="passField" placeholder="Password" required></div>
            <div class="options"><input type="checkbox" id="agree" required><label for="agree">I agree to secure access terms</label></div>
            <button onclick="handleLogin()" class="login-btn">Secure Login</button>
            <p id="errorMsg" style="color: #ff4444; margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>
</div>
